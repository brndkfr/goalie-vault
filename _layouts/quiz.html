<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23121212'/><polygon points='50,10 85,30 85,70 50,90 15,70 15,30' fill='none' stroke='%2300f2ff' stroke-width='8'/><text x='50' y='67' font-size='42' font-family='sans-serif' font-weight='bold' fill='%2300f2ff' text-anchor='middle'>G</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/vault.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>

  <header class="vault-header">
    <a class="vault-header__logo" href="{{ site.baseurl }}/">⬡ Goalie Vault</a>
    <nav class="vault-nav">
      <a href="{{ site.baseurl }}/">Drills</a>
      <a href="{{ site.baseurl }}/quizzes" class="active">Quizzes</a>
    </nav>
  </header>

  <main class="vault-main">
    <!-- Splash screen -->
    <div id="quiz-splash" class="quiz-splash">
      <div class="quiz-splash__inner">
        <h1 class="quiz-splash__title">{{ page.title }}</h1>
        {% if page.description %}
          <p class="quiz-splash__desc">{{ page.description }}</p>
        {% endif %}
        <p class="quiz-splash__meta">{{ page.questions.size }} questions</p>
        <label class="quiz-splash__label" for="quiz-name">Your name</label>
        <input id="quiz-name" class="quiz-input" type="text" placeholder="Enter your name…" autocomplete="off">
        <button id="quiz-start" class="quiz-btn quiz-btn--primary" disabled>Start Quiz</button>
      </div>
    </div>

    <!-- Question screen -->
    <div id="quiz-question" class="quiz-question-screen" style="display:none">
      <div class="quiz-progress-wrap">
        <div id="quiz-progress-bar" class="quiz-progress-bar"></div>
      </div>
      <div class="quiz-question-inner">
        <p id="quiz-counter" class="quiz-counter"></p>
        <h2 id="quiz-q-text" class="quiz-q-text"></h2>
        <div id="quiz-options" class="quiz-options"></div>
        <div id="quiz-explanation" class="quiz-explanation" style="display:none"></div>
        <button id="quiz-next" class="quiz-btn quiz-btn--primary" disabled>Next</button>
      </div>
    </div>

    <!-- Results screen -->
    <div id="quiz-results" class="quiz-results" style="display:none">
      <div class="quiz-results__header">
        <div class="quiz-chart-wrap">
          <canvas id="quiz-chart" width="280" height="280"></canvas>
          <div id="quiz-score-label" class="quiz-score-label"></div>
        </div>
        <p id="quiz-score-text" class="quiz-score-text"></p>
      </div>
      <div id="quiz-breakdown" class="quiz-breakdown"></div>
      <button id="quiz-retake" class="quiz-btn quiz-btn--primary">Retake Quiz</button>
    </div>
  </main>

  <!-- Inject quiz data -->
  <script>
    const QUIZ_DATA     = {{ page.questions | jsonify }};
    const QUIZ_TITLE    = {{ page.title | jsonify }};
    const SHOW_INLINE   = {{ page.show_explanation_inline | default: false | jsonify }};
    {% if site.data.quiz_config %}
    const QUIZ_CONFIG = {
      action: {{ site.data.quiz_config.google_form_action | jsonify }},
      fields: {{ site.data.quiz_config.fields | jsonify }}
    };
    {% else %}
    const QUIZ_CONFIG = null;
    {% endif %}
    const BASE_URL = "{{ site.baseurl }}";
  </script>
  <script src="{{ site.baseurl }}/assets/js/quiz.js"></script>

</body>
</html>
