<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="referrer" content="always">
  <title>{{ page.title }} | {{ site.title }}</title>
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_html | truncate: 160 }}">
  <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
  {% if page.thumbnail %}<meta property="og:image" content="{{ page.thumbnail }}">{% endif %}
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description | strip_html | truncate: 160 }}">
  {% if page.thumbnail %}<meta name="twitter:image" content="{{ page.thumbnail }}">{% endif %}
  <!-- Favicon -->
  <link rel="icon" href="{{ site.baseurl }}/assets/images/favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/vault.css">
</head>
<body>

  <header class="vault-header">
    <a class="vault-header__logo" href="{{ site.baseurl }}/">⬡ Goalie Vault</a>
  </header>

  <main>{{ content }}</main>

  <footer class="vault-footer">
    &copy; {{ "now" | date: "%Y" }} Goalie Vault by brndkfr &middot;
    Code: <a href="{{ site.baseurl }}/LICENSE" target="_blank">MIT</a> &middot;
    Content: <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank">CC BY 4.0</a>
  </footer>

</body>
</html>
