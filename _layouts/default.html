<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="referrer" content="always">
  
  <title>{{ page.title }} | {{ site.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: #fcfcfc; color: #333; }
    header { background: #1a1a1a; padding: 15px; text-align: center; }
    header a { color: #00d4ff; text-decoration: none; font-weight: 800; font-size: 1.2rem; }
    main { padding: 20px; max-width: 800px; margin: 0 auto; }
    footer { text-align: center; padding: 40px 20px; font-size: 0.8rem; color: #999; }
    .instagram-media { margin: 0 auto !important; width: 100% !important; min-width: auto !important; }
  </style>
</head>
<body>
  <header><a href="{{ site.baseurl }}/">{{ site.title }}</a></header>
  <main>{{ content }}</main>
  <footer>&copy; {{ "now" | date: "%Y" }} {{ site.title }}</footer>
</body>
</html>
