<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="referrer" content="always">
  <title>{{ page.title }} | {{ site.title }}</title>
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_html | truncate: 160 }}">
  <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
  {% if page.thumbnail %}<meta property="og:image" content="{{ page.thumbnail }}">{% endif %}
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description | strip_html | truncate: 160 }}">
  {% if page.thumbnail %}<meta name="twitter:image" content="{{ page.thumbnail }}">{% endif %}
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23121212'/><polygon points='50,10 85,30 85,70 50,90 15,70 15,30' fill='none' stroke='%2300f2ff' stroke-width='8'/><text x='50' y='67' font-size='42' font-family='sans-serif' font-weight='bold' fill='%2300f2ff' text-anchor='middle'>G</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/vault.css">
</head>
<body>

  <header class="vault-header">
    <a class="vault-header__logo" href="{{ site.baseurl }}/">⬡ Goalie Vault</a>
    <nav class="vault-nav">
      <a href="{{ site.baseurl }}/" {% if page.url == '/' %}class="active"{% endif %}>Drills</a>
      <a href="{{ site.baseurl }}/quizzes" {% if page.url contains 'quiz' %}class="active"{% endif %}>Quizzes</a>
      <a href="{{ site.baseurl }}/programs" {% if page.url contains 'program' or page.url contains 'article' %}class="active"{% endif %}>Programs</a>
    </nav>
  </header>

  <main>{{ content }}</main>

  <footer class="vault-footer">
    &copy; {{ "now" | date: "%Y" }} Goalie Vault by brndkfr &middot;
    Code: <a href="{{ site.baseurl }}/LICENSE" target="_blank">MIT</a> &middot;
    Content: <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank">CC BY 4.0</a> &middot;
    <a href="#" data-consent-revoke>Privacy choices</a>
  </footer>

  {% include consent-banner.html %}
  <script src="{{ site.baseurl }}/assets/js/consent.js" defer></script>

  <script>
    // Placeholder used when an Instagram CDN thumbnail URL has expired
    // and the <img> errors out. The card layouts call cloneNode() on this.
    (function () {
      var div = document.createElement('div');
      div.className = 'drill-card__thumb drill-card__thumb--ig';
      div.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>';
      window.__vaultIgPlaceholder = div;
    })();
  </script>

</body>
</html>
