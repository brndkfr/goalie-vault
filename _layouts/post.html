---
layout: default
---
<article class="post-container" style="max-width: 600px; margin: 0 auto; padding: 20px; font-family: sans-serif;">

    <h1 style="text-align: center; color: #00d4ff;">{{ page.title }}</h1>
    <div style="text-align: center; margin-top: -10px; margin-bottom: 20px;">
        <span style="color: #888; font-size: 0.9rem;">By {{ page.author }}</span>
        {% if page.insta_handle %}
        <br>
        <a href="https://instagram.com/{{ page.insta_handle }}" target="_blank"
            style="color: #00d4ff; text-decoration: none; font-size: 0.85rem; font-weight: bold;">
            @{{ page.insta_handle }}
        </a>
        {% endif %}
    </div>
    <div class="video-wrapper" style="margin-bottom: 20px;">
        {% if page.video_type == "youtube" %}
        <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;">
            <iframe src="https://www.youtube.com/embed/{{ page.video_id }}"
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" frameborder="0"
                allowfullscreen></iframe>
        </div>
        {% elsif page.video_type == "instagram" %}
        <div style="display: flex; justify-content: center;">
            <blockquote class="instagram-media"
                data-instgrm-permalink="https://www.instagram.com/p/{{ page.video_id }}/" data-instgrm-version="14"
                style="width: 100%;"></blockquote>
            <script async src="//www.instagram.com/embed.js"></script>
        </div>
        {% endif %}
    </div>

    <div class="description"
        style="background: #f4f4f4; padding: 15px; border-left: 5px solid #00d4ff; border-radius: 5px;">
        <p style="font-size: 1.1rem; line-height: 1.6; color: #333;">
            {{ page.description }}
        </p>
    </div>

    <div style="margin-top: 30px; text-align: center;">
        <a href="{{ site.baseurl }}/" style="text-decoration: none; color: #00d4ff; font-weight: bold;">← Back to
            Vault</a>
    </div>

</article>
