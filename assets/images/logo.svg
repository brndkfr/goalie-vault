<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Goalie Vault">
  <rect width="100" height="100" rx="16" fill="#121212"/>
  <polygon points="50,10 85,30 85,70 50,90 15,70 15,30"
           fill="none" stroke="#00f2ff" stroke-width="6" stroke-linejoin="round"/>
  <g stroke="#00f2ff" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- mask shell: rounded dome tapering to chin -->
    <path d="M30,40 Q30,26 50,26 Q70,26 70,40 L70,58 Q70,72 50,74 Q30,72 30,58 Z"
          stroke-width="3.5"/>
    <!-- grille window -->
    <ellipse cx="50" cy="52" rx="16" ry="13" stroke-width="2.5"/>
    <!-- horizontal cage bars -->
    <line x1="36" y1="46" x2="64" y2="46" stroke-width="1.8"/>
    <line x1="34" y1="52" x2="66" y2="52" stroke-width="1.8"/>
    <line x1="36" y1="58" x2="64" y2="58" stroke-width="1.8"/>
    <!-- vertical center post -->
    <line x1="50" y1="40" x2="50" y2="64" stroke-width="1.8"/>
  </g>
</svg>
