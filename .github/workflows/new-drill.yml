name: Create New Drill from Form
on:
  issues:
    types: [opened, labeled]

jobs:
  create-post:
    # Only run if the issue has the 'new-drill' label
    if: |
      contains(github.event.issue.labels.*.name, 'new-drill') ||
      github.event.label.name == 'new-drill'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Data from Issue Form
        id: parse
        uses: zentered/issue-forms-body-parser@v2.2.0
        with:
          body: ${{ github.event.issue.body }}

      - name: Build Markdown Post
        env:
          PARSE_DATA: ${{ steps.parse.outputs.data }}
        shell: bash
        run: |
          # Extract data using jq to safely handle hyphenated keys
          TITLE=$(echo "$PARSE_DATA" | jq -r '.["drill-title"].text')
          AUTHOR=$(echo "$PARSE_DATA" | jq -r '.["author-name"].text')
          HANDLE=$(echo "$PARSE_DATA" | jq -r '.["social-media-handle"].text')
          # Use links[0].src for a clean URL without angle brackets
          URL=$(echo "$PARSE_DATA" | jq -r '.["video-link"].links[0].src')
          NOTES=$(echo "$PARSE_DATA" | jq -r '[.["coaching-notes"].list[].text] | join(" | ")')

          # Process Checkboxes: use the structured list array instead of raw text
          CATEGORY=$(echo "$PARSE_DATA" | jq -r '.categories.list[] | select(.checked == true) | .text' | paste -sd ',' - | sed 's/,/, /g')

          # Validation: Exit if URL is empty
          if [ -z "$URL" ]; then
            echo "Error: Video URL is empty. Please check the Issue Form."
            exit 1
          fi

          # Extract Video ID (Instagram or YouTube)
          if [[ "$URL" == *"instagram.com"* ]]; then
            PLATFORM="instagram"
            VIDEO_ID=$(echo "$URL" | grep -oE '(/p/|/reels/)[^/]+' | cut -d'/' -f3)
          else
            PLATFORM="youtube"
            VIDEO_ID=$(echo "$URL" | sed -n 's/.*v=\([^&]*\).*/\1/p')
            if [ -z "$VIDEO_ID" ]; then VIDEO_ID=$(echo "$URL" | awk -F'/' '{print $NF}' | cut -d'?' -f1); fi
          fi

          # Generate Filename (Date + Slugified Title)
          DATE=$(date +%Y-%m-%d)
          SAFE_TITLE=$(echo "$TITLE" | tr -cd '[:alnum:] ' | tr ' ' '-' | tr '[:upper:]' '[:lower:]')
          FILENAME="_posts/${DATE}-${SAFE_TITLE}.md"

          # Create the Markdown file with Frontmatter
          {
            echo "---"
            echo "layout: post"
            echo "title: \"$TITLE\""
            echo "author: \"$AUTHOR\""
            echo "handle: \"$HANDLE\""
            echo "category: [$CATEGORY]"
            echo "platform: \"$PLATFORM\""
            echo "video_id: \"$VIDEO_ID\""
            echo "thumbnail: \"\""
            echo "description: \"$NOTES\""
            echo "---"
          } > $FILENAME

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GoalieVault-Bot"
          git config --global user.email "actions@github.com"
          git add _posts/*.md
          git commit -m "Automated: New Drill - ${{ github.event.issue.title }}"
          git push

      - name: Close Issue
        run: gh issue close ${{ github.event.issue.number }} --comment "Success! The drill is now live in the Vault. ✅"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
