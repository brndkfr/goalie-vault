name: Create New Drill from Form
on:
  issues:
    types: [opened, labeled]

jobs:
  create-post:
    # Only run if the issue has the 'new-drill' label
    if: |
      contains(github.event.issue.labels.*.name, 'new-drill') ||
      github.event.label.name == 'new-drill'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Data from Issue Form
        id: parse
        uses: zentered/issue-forms-body-parser@v2.2.0
        with:
          body: ${{ github.event.issue.body }}

      - name: Build Markdown Post
        env:
          PARSE_DATA: ${{ steps.parse.outputs.data }}
        shell: bash
        run: |
          # Derive title from issue title (strip '[Drill]: ' prefix)
          TITLE=$(echo "${{ github.event.issue.title }}" | sed 's/^\[Drill\]: *//')
          AUTHOR=$(echo "$PARSE_DATA" | jq -r '.["author-name"].text')
          HANDLE=$(echo "$PARSE_DATA" | jq -r '.["social-media-handle"].text')
          # Use links[0].src for a clean URL without angle brackets
          URL=$(echo "$PARSE_DATA" | jq -r '.["video-link"].links[0].src')
          NOTES=$(echo "$PARSE_DATA" | jq -r 'if (.["coaching-notes"].list | length) > 0 then [.["coaching-notes"].list[].text] | join(" | ") else .["coaching-notes"].text end')
          # Strip GitHub's '*No response*' placeholder for all optional fields
          AUTHOR=$(echo "$AUTHOR" | sed 's/^\*No response\*$//')
          HANDLE=$(echo "$HANDLE" | sed 's/^\*No response\*$//')
          NOTES=$(echo "$NOTES" | sed 's/^\*No response\*$//')
          # Process Checkboxes: use the structured list array instead of raw text
          CATEGORY=$(echo "$PARSE_DATA" | jq -r '.categories.list[] | select(.checked == true) | .text' | paste -sd ',' - | sed 's/,/, /g')

          # Validation: Exit if URL is empty
          if [ -z "$URL" ]; then
            echo "Error: Video URL is empty. Please check the Issue Form."
            exit 1
          fi

          # Extract Video ID (Instagram or YouTube)
          if [[ "$URL" == *"instagram.com"* ]]; then
            PLATFORM="instagram"
            VIDEO_ID=$(echo "$URL" | grep -oE '(/p/|/reels/|/reel/)[^/?]+' | awk -F'/' '{print $NF}')
          else
            PLATFORM="youtube"
            VIDEO_ID=$(echo "$URL" | sed -n 's/.*v=\([^&]*\).*/\1/p')
            if [ -z "$VIDEO_ID" ]; then VIDEO_ID=$(echo "$URL" | awk -F'/' '{print $NF}' | cut -d'?' -f1); fi
          fi

          # Generate Filename (Date + Slugified Title)
          DATE=$(date +%Y-%m-%d)
          SAFE_TITLE=$(echo "$TITLE" | tr -cd '[:alnum:] ' | tr ' ' '-' | tr '[:upper:]' '[:lower:]')
          FILENAME="_posts/${DATE}-${SAFE_TITLE}.md"

          # Pass variables to subsequent steps (use heredoc for values that may contain special chars)
          echo "PLATFORM=$PLATFORM"         >> "$GITHUB_ENV"
          echo "VIDEO_ID=$VIDEO_ID"         >> "$GITHUB_ENV"
          echo "URL=$URL"                   >> "$GITHUB_ENV"
          echo "FILENAME=$FILENAME"         >> "$GITHUB_ENV"
          echo "AUTHOR=$AUTHOR"             >> "$GITHUB_ENV"
          echo "HANDLE=$HANDLE"             >> "$GITHUB_ENV"
          echo "CATEGORY=$CATEGORY"         >> "$GITHUB_ENV"
          # Heredoc format for fields that may contain punctuation or spaces
          { echo 'TITLE<<EOF_TITLE'; echo "$TITLE"; echo 'EOF_TITLE'; } >> "$GITHUB_ENV"
          { echo 'NOTES<<EOF_NOTES';  echo "$NOTES";  echo 'EOF_NOTES';  } >> "$GITHUB_ENV"

      - name: Lookup Instagram CDN thumbnail
        if: env.PLATFORM == 'instagram'
        continue-on-error: true
        shell: bash
        run: |
          VIDEO_ID="${{ env.VIDEO_ID }}"
          EMBED_URL="https://www.instagram.com/p/${VIDEO_ID}/embed/captioned/"
          BODY=$(curl -sL --max-time 20 \
            -H 'User-Agent: facebookexternalhit/1.1 (+http://www.facebook.com/externalhit_uatext.php)' \
            "$EMBED_URL") || true

          # Extract scontent CDN URL (post media, not profile pic)
          CDN_URL=$(echo "$BODY" \
            | grep -oP 'src="(https?://[^"]*scontent[^"]+\.(?:jpe?g|webp|png)[^"]*)"' \
            | head -1 \
            | sed 's/^src="//;s/"$//' \
            | python3 -c 'import html,sys; print(html.unescape(sys.stdin.read().strip()))') || true

          if [ -n "$CDN_URL" ]; then
            # Extract expiry from oe= hex timestamp
            OE_HEX=$(echo "$CDN_URL" | grep -oP '(?<=[?&]oe=)[0-9A-Fa-f]+' | head -1)
            if [ -n "$OE_HEX" ]; then
              EXPIRES=$(python3 -c "from datetime import datetime,timezone; print(datetime.fromtimestamp(int('$OE_HEX',16),tz=timezone.utc).date().isoformat())")
            else
              EXPIRES=$(date -d '+5 days' +%Y-%m-%d)
            fi

            # Upsert into _data/thumbnails.json
            TODAY=$(date +%Y-%m-%d)
            CDN_URL="$CDN_URL" EXPIRES="$EXPIRES" TODAY="$TODAY" VIDEO_ID="$VIDEO_ID" \
            python3 -c "
import json, os, pathlib
f = pathlib.Path('_data/thumbnails.json')
data = json.loads(f.read_text()) if f.exists() else {}
data[os.environ['VIDEO_ID']] = {
    'url': os.environ['CDN_URL'],
    'status': 'ok',
    'fetched': os.environ['TODAY'],
    'expires': os.environ['EXPIRES'],
    'attempts': 0
}
f.write_text(json.dumps(data, indent=2, sort_keys=True, ensure_ascii=False) + '\n')
"
            echo "THUMB_FETCHED=true" >> "$GITHUB_ENV"
          else
            echo "THUMB_FETCHED=false" >> "$GITHUB_ENV"
          fi

      - name: Warn if thumbnail lookup failed
        if: env.PLATFORM == 'instagram' && env.THUMB_FETCHED == 'false'
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "⚠️ **Thumbnail not fetched** — could not retrieve a CDN thumbnail URL for this Instagram post. The drill was created with the SVG placeholder instead. The weekly \`refetch-thumbnails\` run will retry automatically."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write Post File
        shell: bash
        run: |
          {
            echo "---"
            echo "layout: post"
            echo "title: \"${{ env.TITLE }}\""
            echo "author: \"${{ env.AUTHOR }}\""
            echo "handle: \"${{ env.HANDLE }}\""
            echo "category: [${{ env.CATEGORY }}]"
            echo "platform: \"${{ env.PLATFORM }}\""
            echo "video_id: \"${{ env.VIDEO_ID }}\""
            echo "description: \"${{ env.NOTES }}\""
            echo "---"
          } > "${{ env.FILENAME }}"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GoalieVault-Bot"
          git config --global user.email "actions@github.com"
          git add _posts/ _data/thumbnails.json
          git commit -m "Automated: New Drill - ${{ github.event.issue.title }}"
          # Retry with rebase if remote moved while we were working
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 3))
          done

      - name: Close Issue
        if: success()
        run: gh issue close ${{ github.event.issue.number }} --comment "Success! The drill is now live in the Vault. ✅"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
