name: Create New Drill from Form
on:
  issues:
    types: [opened, labeled]

jobs:
  create-post:
    # Führt den Job aus, wenn das Label vorhanden ist oder gerade hinzugefügt wurde
    if: |
      contains(github.event.issue.labels.*.name, 'new-drill') ||
      github.event.label.name == 'new-drill'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract Data from Issue Form
        id: parse
        uses: zentered/issue-forms-body-parser@v2.2.0
        with:
          issue_id: ${{ github.event.issue.number }}

      - name: Build Markdown Post
        shell: bash
        run: |
          # Daten aus dem Formular ziehen (IDs müssen zum Template passen)
          TITLE="${{ fromJson(steps.parse.outputs.data).title.text }}"
          AUTHOR="${{ fromJson(steps.parse.outputs.data).author.text }}"
          HANDLE="${{ fromJson(steps.parse.outputs.data).handle.text }}"
          URL="${{ fromJson(steps.parse.outputs.data).url.text }}"
          NOTES="${{ fromJson(steps.parse.outputs.data).notes.text }}"
          
          # Checkboxen verarbeiten: Markierte Labels extrahieren
          CATEGORY=$(echo "${{ fromJson(steps.parse.outputs.data).category.raw }}" | grep "\[x\]" | sed 's/- \[x\] //' | xargs | sed 's/ /, /g')

          # Video ID Logik für Instagram und YouTube
          if [[ "$URL" == *"instagram.com"* ]]; then
            PLATFORM="instagram"
            VIDEO_ID=$(echo "$URL" | grep -oE '(/p/|/reels/)[^/]+' | cut -d'/' -f3)
          else
            PLATFORM="youtube"
            VIDEO_ID=$(echo "$URL" | sed -n 's/.*v=\([^&]*\).*/\1/p')
            if [ -z "$VIDEO_ID" ]; then VIDEO_ID=$(echo "$URL" | awk -F'/' '{print $NF}' | cut -d'?' -f1); fi
          fi

          # Dateiname generieren (Datum + Titel-Slug)
          DATE=$(date +%Y-%m-%d)
          SAFE_TITLE=$(echo "$TITLE" | sed 's/[^a-zA-Z0-9]/ /g' | xargs | tr ' ' '-' | tr '[:upper:]' '[:lower:]')
          FILENAME="_posts/${DATE}-${SAFE_TITLE}.md"

          # Markdown Datei schreiben
          {
            echo "---"
            echo "layout: post"
            echo "title: \"$TITLE\""
            echo "author: \"$AUTHOR\""
            echo "handle: \"$HANDLE\""
            echo "category: [$CATEGORY]"
            echo "platform: \"$PLATFORM\""
            echo "video_id: \"$VIDEO_ID\""
            echo "description: \"$NOTES\""
            echo "---"
          } > $FILENAME

      - name: Commit and Push
        run: |
          git config --global user.name "GoalieVault-Bot"
          git config --global user.email "actions@github.com"
          git add _posts/*.md
          git commit -m "New Drill: ${{ github.event.issue.title }}"
          git push

      - name: Close Issue
        run: gh issue close ${{ github.event.issue.number }} --comment "Drill is live! ✅ Everything was processed successfully."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}


