name: Remove Drill Thumbnail
on:
  workflow_dispatch:
    inputs:
      post_slug:
        description: "Post slug (e.g. 2026-04-24-inner-core-strength)"
        required: true

jobs:
  remove-thumbnail:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Remove thumbnail from thumbnails.json
        shell: bash
        run: |
          SLUG="${{ github.event.inputs.post_slug }}"
          FILE=$(ls _posts/${SLUG}.md 2>/dev/null | head -1)

          if [ -z "$FILE" ]; then
            echo "Error: No post found matching slug '${SLUG}'"
            exit 1
          fi

          echo "Found post: $FILE"

          # Extract video_id to find the thumbnails.json entry
          VIDEO_ID=$(grep '^video_id:' "$FILE" | sed 's/video_id: *"\(.*\)"/\1/')

          if [ -z "$VIDEO_ID" ]; then
            echo "No video_id found in $FILE — nothing to remove"
            exit 0
          fi

          # Remove the entry from _data/thumbnails.json
          VIDEO_ID="$VIDEO_ID" python3 -c "
import json, os, pathlib
f = pathlib.Path('_data/thumbnails.json')
if not f.exists():
    print('thumbnails.json not found')
    raise SystemExit(0)
data = json.loads(f.read_text())
vid = os.environ['VIDEO_ID']
if vid in data:
    del data[vid]
    f.write_text(json.dumps(data, indent=2, sort_keys=True, ensure_ascii=False) + '\n')
    print(f'Removed {vid} from thumbnails.json')
else:
    print(f'{vid} not found in thumbnails.json')
"

      - name: Commit and Push
        run: |
          git config --global user.name "GoalieVault-Bot"
          git config --global user.email "actions@github.com"
          git add _data/thumbnails.json
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: remove thumbnail for ${{ github.event.inputs.post_slug }}"
          git push
