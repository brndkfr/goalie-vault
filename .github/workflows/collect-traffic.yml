name: Collect GitHub traffic stats

# Snapshot the 14-day Traffic API daily so we accumulate unlimited
# history. Runs at 06:17 UTC; idempotent (same-day reruns are safe).

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch but don't write/commit)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  # Traffic API requires "administration" read; without it the
  # default GITHUB_TOKEN gets HTTP 403 on /traffic/* endpoints.
  administration: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect traffic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/collect_traffic.py --dry-run
          else
            python scripts/collect_traffic.py
          fi

      - name: Commit changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "GoalieVault-Bot"
          git config user.email "actions@github.com"
          git add _data/traffic
          if git diff --cached --quiet; then
            echo "No traffic changes to commit."
            exit 0
          fi
          git commit -m "traffic: daily snapshot $(date -u +%Y-%m-%d) [skip ci]"
          # Retry-on-rebase in case another bot pushed concurrently.
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected, rebasing and retrying ($i)..."
            git pull --rebase --autostash
          done
          echo "Failed to push after retries." >&2
          exit 1
