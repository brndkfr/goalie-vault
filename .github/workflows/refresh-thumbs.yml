name: Refresh Instagram thumbnail URLs

on:
  schedule:
    # Daily at 06:17 UTC. Cron is best-effort; GitHub may add jitter.
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      max:
        description: "Max IDs to refresh in this run"
        required: false
        default: "30"
      dry_run:
        description: "Dry run (no network calls)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp
        run: pip install --upgrade yt-dlp

      - name: Refresh thumbnail URLs
        env:
          MAX: ${{ github.event.inputs.max || '30' }}
          DRY: ${{ github.event.inputs.dry_run }}
        run: |
          if [ "$DRY" = "true" ]; then
            python scripts/refresh_thumb_urls.py --max "$MAX" --dry-run
          else
            python scripts/refresh_thumb_urls.py --max "$MAX"
          fi

      - name: Create pull request
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh Instagram thumbnail URLs"
          title: "chore: refresh Instagram thumbnail URLs"
          body: |
            Automated refresh of Instagram CDN thumbnail URLs in
            `_data/thumbnails.json` via `scripts/refresh_thumb_urls.py`.

            URLs from Instagram's CDN expire after a few weeks, so this
            workflow runs daily and refreshes the oldest entries.
          branch: chore/refresh-thumbs
          delete-branch: true
          add-paths: |
            _data/thumbnails.json
