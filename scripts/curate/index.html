<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Instagram Link Curator</title>
<style>
  :root {
    --bg: #111;
    --fg: #eee;
    --muted: #888;
    --card: #1d1d1d;
    --border: #333;
    --keep: #2ecc71;
    --maybe: #f1c40f;
    --discard: #e74c3c;
    --accent: #3498db;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    font-size: 14px;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #181818;
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px 14px;
  }
  header h1 { font-size: 16px; margin: 0 8px 0 0; font-weight: 600; }
  header .counts { display: flex; gap: 6px; }
  header .count {
    padding: 3px 8px;
    border-radius: 10px;
    background: #222;
    border: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  header .count.active { outline: 2px solid var(--accent); }
  .count.keep { color: var(--keep); }
  .count.maybe { color: var(--maybe); }
  .count.discard { color: var(--discard); }
  header input[type="search"], header select {
    background: #222;
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
  }
  header button {
    background: #222;
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
  }
  header button:hover { background: #2a2a2a; }
  main {
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    outline: none;
  }
  .card:focus { box-shadow: 0 0 0 2px var(--accent) inset; }
  .card.keep    { border-color: var(--keep); }
  .card.maybe   { border-color: var(--maybe); }
  .card.discard { border-color: var(--discard); opacity: 0.55; }
  .card .thumb {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    background: #000;
    cursor: pointer;
    display: block;
  }
  .card .placeholder {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    color: var(--muted);
    font-family: monospace;
    font-size: 11px;
    text-align: center;
    padding: 8px;
  }
  .card .body { padding: 6px 8px; display: flex; flex-direction: column; gap: 4px; }
  .card .uploader { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .title { font-size: 12px; line-height: 1.3; max-height: 2.6em; overflow: hidden; }
  .card .actions { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .card .status-pill {
    flex: 1 1 auto;
    text-align: center;
    padding: 2px 6px;
    border-radius: 10px;
    background: #2a2a2a;
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 11px;
    user-select: none;
  }
  .card.keep    .status-pill { background: var(--keep);    color: #000; }
  .card.maybe   .status-pill { background: var(--maybe);   color: #000; }
  .card.discard .status-pill { background: var(--discard); color: #000; }
  .card select {
    flex: 1 1 100%;
    background: #222;
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 4px;
    font-size: 11px;
  }
  .card a.open {
    color: var(--accent);
    text-decoration: none;
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 11px;
  }
  .banner {
    background: #3a2a00;
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    color: #ffcc66;
    font-family: monospace;
  }
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--muted);
    padding: 40px;
  }
</style>
</head>
<body>
<header>
  <h1>IG Curator</h1>
  <div class="counts">
    <span class="count" data-filter="all">All <b id="c-all">0</b></span>
    <span class="count" data-filter="undecided">Undecided <b id="c-undecided">0</b></span>
    <span class="count keep" data-filter="keep">Keep <b id="c-keep">0</b></span>
    <span class="count maybe" data-filter="maybe">Maybe <b id="c-maybe">0</b></span>
    <span class="count discard" data-filter="discard">Discard <b id="c-discard">0</b></span>
  </div>
  <select id="cat-filter" title="Filter by category">
    <option value="">All categories</option>
    <option value="__none__">(uncategorized)</option>
  </select>
  <input id="search" type="search" placeholder="Search id / title / uploader" size="28">
  <button id="export">Export</button>
  <button id="import">Import</button>
  <input id="import-file" type="file" accept="application/json" hidden>
  <label style="display:inline-flex; align-items:center; gap:4px; font-size:12px; color:var(--muted);">
    <input id="hide-done" type="checkbox"> Hide done (keep + categorized)
  </label>
  <span style="margin-left:auto; color:var(--muted); font-size:12px;">
    Click image: cycle status &nbsp;·&nbsp; K keep · M maybe · D discard · U undecided · O open · ←/→ navigate
  </span>
</header>
<div id="banner"></div>
<main id="grid"></main>

<script>
const STORAGE_KEY = "igCurate.v1";
const STATUSES = ["undecided", "keep", "maybe", "discard"];

let manifest = { categories: [], items: [] };
let state = {}; // id -> { status, category }
let filter = { status: "all", category: "", search: "", hideDone: false };

function loadState() {
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { state = {}; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function entry(id) { return state[id] || (state[id] = { status: "undecided", category: "" }); }

function cycleStatus(id, dir = 1) {
  const e = entry(id);
  const i = STATUSES.indexOf(e.status);
  e.status = STATUSES[(i + dir + STATUSES.length) % STATUSES.length];
  saveState();
}
function setStatus(id, s) { entry(id).status = s; saveState(); }
function setCategory(id, c) { entry(id).category = c; saveState(); }

function visibleItems() {
  const q = filter.search.trim().toLowerCase();
  return manifest.items.filter(it => {
    const e = entry(it.id);
    if (filter.status !== "all" && e.status !== filter.status) return false;
    if (filter.category && e.category !== filter.category) return false;
    if (q) {
      const hay = (it.id + " " + (it.title || "") + " " + (it.uploader || "") + " " + (it.uploader_id || "")).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

const cardById = new Map();

function buildAllCards() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  cardById.clear();
  const frag = document.createDocumentFragment();
  for (const it of manifest.items) {
    const card = makeCard(it);
    cardById.set(it.id, card);
    frag.appendChild(card);
  }
  grid.appendChild(frag);
}

function applyFilter() {
  const q = filter.search.trim().toLowerCase();
  let visible = 0;
  for (const it of manifest.items) {
    const card = cardById.get(it.id);
    if (!card) continue;
    const e = entry(it.id);
    let show = true;
    if (filter.status !== "all" && e.status !== filter.status) show = false;
    else if (filter.category === "__none__" && e.category) show = false;
    else if (filter.category && filter.category !== "__none__" && e.category !== filter.category) show = false;
    else if (filter.hideDone && e.status === "keep" && e.category) show = false;
    else if (q) {
      const hay = (it.id + " " + (it.title || "") + " " + (it.uploader || "") + " " + (it.uploader_id || "")).toLowerCase();
      if (!hay.includes(q)) show = false;
    }
    card.style.display = show ? "" : "none";
    if (show) visible++;
  }
  let empty = document.getElementById("empty-msg");
  if (visible === 0) {
    if (!empty) {
      empty = document.createElement("div");
      empty.id = "empty-msg";
      empty.className = "empty";
      empty.textContent = "No items match the current filters.";
      document.getElementById("grid").appendChild(empty);
    }
    empty.style.display = "";
  } else if (empty) {
    empty.style.display = "none";
  }
  updateCounts();
}

// Debounce search input so typing doesn't re-filter on every keystroke.
function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function makeCard(it) {
  const e = entry(it.id);
  const card = document.createElement("div");
  card.className = "card " + e.status;
  card.tabIndex = 0;
  card.dataset.id = it.id;

  if (it.thumb) {
    const img = document.createElement("img");
    img.className = "thumb";
    img.loading = "lazy";
    img.src = it.thumb;
    img.alt = it.id;
    img.title = "Click to cycle status";
    img.addEventListener("click", () => { cycleStatus(it.id); refreshCard(card, it); });
    card.appendChild(img);
  } else {
    const ph = document.createElement("div");
    ph.className = "placeholder";
    ph.textContent = "no thumbnail\n" + it.id;
    card.appendChild(ph);
  }

  const body = document.createElement("div");
  body.className = "body";

  const upl = document.createElement("div");
  upl.className = "uploader";
  upl.textContent = it.uploader_id ? "@" + it.uploader_id : (it.uploader || it.id);
  body.appendChild(upl);

  if (it.title) {
    const t = document.createElement("div");
    t.className = "title";
    t.textContent = it.title;
    body.appendChild(t);
  }

  const actions = document.createElement("div");
  actions.className = "actions";

  const pill = document.createElement("span");
  pill.className = "status-pill";
  pill.textContent = e.status;
  pill.addEventListener("click", () => { cycleStatus(it.id); refreshCard(card, it); });
  actions.appendChild(pill);

  const open = document.createElement("a");
  open.className = "open";
  open.href = it.webpage_url;
  open.target = "_blank";
  open.rel = "noopener";
  open.textContent = "↗";
  open.title = "Open on Instagram";
  actions.appendChild(open);

  const sel = document.createElement("select");
  const blank = document.createElement("option");
  blank.value = "";
  blank.textContent = "(uncategorized)";
  sel.appendChild(blank);
  for (const c of manifest.categories) {
    const o = document.createElement("option");
    o.value = c;
    o.textContent = c;
    sel.appendChild(o);
  }
  // Preserve a custom category that isn't in the manifest list.
  if (e.category && !manifest.categories.includes(e.category)) {
    const o = document.createElement("option");
    o.value = e.category;
    o.textContent = e.category + " (custom)";
    sel.appendChild(o);
  }
  const otherOpt = document.createElement("option");
  otherOpt.value = "__other__";
  otherOpt.textContent = "(other...)";
  sel.appendChild(otherOpt);

  sel.value = e.category || "";
  sel.addEventListener("change", () => {
    if (sel.value === "__other__") {
      let v = "";
      try { v = (window.prompt("Custom category name:") || "").trim(); }
      catch { v = ""; }
      if (!v) {
        sel.value = e.category || "";
        return;
      }
      // Inject a new option so the dropdown can show it.
      const o = document.createElement("option");
      o.value = v;
      o.textContent = v + " (custom)";
      sel.insertBefore(o, otherOpt);
      sel.value = v;
      setCategory(it.id, v);
    } else {
      setCategory(it.id, sel.value);
    }
    if (filter.category || filter.hideDone) applyFilter();
    else updateCounts();
  });
  actions.appendChild(sel);

  body.appendChild(actions);
  card.appendChild(body);
  return card;
}

function refreshCard(card, it) {
  const e = entry(it.id);
  card.classList.remove("undecided", "keep", "maybe", "discard");
  card.classList.add(e.status);
  const pill = card.querySelector(".status-pill");
  if (pill) pill.textContent = e.status;
  // Re-apply filter so the card disappears if it no longer matches.
  if (filter.status !== "all" || filter.category || filter.hideDone) applyFilter();
  else updateCounts();
}

function updateCounts() {
  const counts = { all: manifest.items.length, undecided: 0, keep: 0, maybe: 0, discard: 0 };
  for (const it of manifest.items) counts[entry(it.id).status]++;
  for (const k of Object.keys(counts)) {
    const el = document.getElementById("c-" + k);
    if (el) el.textContent = counts[k];
  }
  document.querySelectorAll(".count").forEach(el => {
    el.classList.toggle("active", el.dataset.filter === filter.status);
  });
}

function exportJson() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "curation.json";
  document.body.appendChild(a);
  a.click();
  a.remove();
}

function importJson(file) {
  const r = new FileReader();
  r.onload = () => {
    try {
      const data = JSON.parse(r.result);
      if (typeof data !== "object" || !data) throw new Error("not an object");
      // Detect whether incoming entries carry per-field values vs a full
      // {status, category}. Either way we MERGE per-field instead of
      // replacing entire entries, so suggestions only fill blanks.
      let added = 0, filled = 0, conflicts = 0;
      for (const [id, incoming] of Object.entries(data)) {
        const cur = state[id] || {};
        const next = { ...cur };
        for (const k of ["status", "category"]) {
          const v = incoming[k];
          if (v === undefined || v === null || v === "") continue;
          if (!cur[k] || cur[k] === "undecided") {
            next[k] = v;
            if (!cur[k]) filled++;
          } else if (cur[k] !== v) {
            conflicts++;
          }
        }
        if (!state[id]) added++;
        state[id] = next;
      }
      saveState();
      buildAllCards();
      applyFilter();
      alert(`Import done.\nAdded: ${added}\nFilled empty fields: ${filled}\nKept existing (conflicts): ${conflicts}`);
    } catch (e) {
      alert("Import failed: " + e.message);
    }
  };
  r.readAsText(file);
}

// --- wire up ---
document.querySelectorAll(".count").forEach(el => {
  el.addEventListener("click", () => {
    filter.status = el.dataset.filter;
    applyFilter();
  });
});
document.getElementById("cat-filter").addEventListener("change", e => {
  filter.category = e.target.value;
  applyFilter();
});
document.getElementById("search").addEventListener("input", debounce(e => {
  filter.search = e.target.value;
  applyFilter();
}, 150));
document.getElementById("export").addEventListener("click", exportJson);
document.getElementById("import").addEventListener("click", () =>
  document.getElementById("import-file").click()
);
document.getElementById("import-file").addEventListener("change", e => {
  if (e.target.files[0]) importJson(e.target.files[0]);
  e.target.value = "";
});
document.getElementById("hide-done").addEventListener("change", e => {
  filter.hideDone = e.target.checked;
  applyFilter();
});

document.addEventListener("keydown", e => {
  const card = document.activeElement.closest && document.activeElement.closest(".card");
  if (!card) return;
  const id = card.dataset.id;
  const it = manifest.items.find(x => x.id === id);
  if (!it) return;
  const map = { k: "keep", m: "maybe", d: "discard", u: "undecided" };
  const k = e.key.toLowerCase();
  if (map[k]) { setStatus(id, map[k]); refreshCard(card, it); e.preventDefault(); return; }
  if (k === "o") { window.open(it.webpage_url, "_blank", "noopener"); e.preventDefault(); return; }
  if (e.key === "ArrowRight" || e.key === "ArrowLeft") {
    const cards = [...document.querySelectorAll(".card")];
    const i = cards.indexOf(card);
    const next = cards[i + (e.key === "ArrowRight" ? 1 : -1)];
    if (next) { next.focus(); e.preventDefault(); }
  }
});

async function init() {
  loadState();
  try {
    const r = await fetch("manifest.json", { cache: "no-store" });
    if (!r.ok) throw new Error(r.status + " " + r.statusText);
    manifest = await r.json();
  } catch (e) {
    document.getElementById("banner").innerHTML =
      `<div class="banner">Could not load manifest.json (${e.message}). ` +
      `Run <code>python scripts/build_curate_manifest.py</code> and reload. ` +
      `If you opened this via file://, your browser may block fetch — try ` +
      `<code>python -m http.server</code> from the repo root and visit ` +
      `<code>http://localhost:8000/scripts/curate/</code>.</div>`;
    return;
  }
  // Populate category filter dropdown.
  const catSel = document.getElementById("cat-filter");
  for (const c of manifest.categories) {
    const o = document.createElement("option");
    o.value = c;
    o.textContent = c;
    catSel.appendChild(o);
  }
  buildAllCards();
  applyFilter();
}
init();
</script>
</body>
</html>
