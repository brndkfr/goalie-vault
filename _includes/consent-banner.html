<div id="consent-banner" class="consent-banner" hidden>
  <div class="consent-banner__inner">
    <p class="consent-banner__text">
      This site embeds videos from <strong>Instagram</strong> and <strong>YouTube</strong>.
      Loading them sends your IP address and may set cookies on your device through Meta and Google.
      You can change this choice anytime via the link in the footer.
    </p>
    <div class="consent-banner__actions">
      <button type="button" class="consent-banner__btn consent-banner__btn--secondary"
              data-consent-action="deny">Show placeholders only</button>
      <button type="button" class="consent-banner__btn consent-banner__btn--primary"
              data-consent-action="allow">Allow embeds</button>
    </div>
  </div>
</div>
